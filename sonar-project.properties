sonar.projectKey=beto-dt_portfolio-dt
sonar.organization=beto-dt

# Bilingual content (es/en) and the generated published JSON mirror the same
# structure across locales by design, which the copy-paste detector flags as
# duplication. Exclude the content data from duplication detection.
sonar.cpd.exclusions=src/content/seed/**,src/content/published/**

# This project has no automated test suite (verification is via tsc + manual
# render checks), so coverage-on-new-code is not a meaningful gate here.
sonar.coverage.exclusions=**/*
